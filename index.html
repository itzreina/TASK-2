```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:20px;
}

header h1{
    color:#2c3e50;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-weight:bold;
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.main-content{
    display:grid;
    grid-template-columns:1fr 2fr;
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 4px 6px rgba(0,0,0,.1);
}

h3{
    margin-bottom:15px;
    color:#34495e;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:600;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
}

.btn-submit{
    background:#2ecc71;
    color:white;
}

.btn-submit:hover{
    background:#27ae60;
}

.btn-cancel{
    background:#95a5a6;
    color:white;
    margin-top:8px;
    display:none;
}

.btn-cancel:hover{
    background:#7f8c8d;
}

.search-box{
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#34495e;
    color:white;
}

.actions{
    display:flex;
    gap:5px;
}

.btn-edit{
    background:#3498db;
    color:white;
    padding:6px 10px;
    width:auto;
}

.btn-delete{
    background:#e74c3c;
    color:white;
    padding:6px 10px;
    width:auto;
}

.btn-edit:hover{
    background:#2980b9;
}

.btn-delete:hover{
    background:#c0392b;
}

@media(max-width:768px){
    .main-content{
        grid-template-columns:1fr;
    }

    .stats{
        flex-direction:column;
        gap:10px;
    }
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>Employee Management System</h1>
</header>

<div class="stats">
    <div>Total Employees: <span id="totalEmployees">0</span></div>
    <div>Total Salary: $<span id="totalSalary">0</span></div>
</div>

<div class="main-content">

<div class="card">

<h3 id="form-title">Add Employee</h3>

<form id="employee-form">

<input type="hidden" id="employee-id">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Position</label>
<input type="text" id="position" required>
</div>

<div class="form-group">
<label>Monthly Salary ($)</label>
<input type="number" id="salary" required>
</div>

<button class="btn-submit" type="submit" id="btn-save">
Save Employee
</button>

<button type="button" class="btn-cancel" id="btn-cancel">
Cancel Edit
</button>

</form>

</div>

<div class="card">

<h3>Employee Records</h3>

<div class="search-box">
<input
type="text"
id="search"
placeholder="Search employee..."
>
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Position</th>
<th>Salary</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="employee-list"></tbody>

</table>

</div>

</div>

</div>

<script>

let employees =
JSON.parse(localStorage.getItem("employees")) || [];

const form = document.getElementById("employee-form");
const employeeList = document.getElementById("employee-list");
const formTitle = document.getElementById("form-title");
const btnSave = document.getElementById("btn-save");
const btnCancel = document.getElementById("btn-cancel");

function saveEmployees(){
    localStorage.setItem(
        "employees",
        JSON.stringify(employees)
    );
}

function updateStats(){

    document.getElementById("totalEmployees")
    .textContent = employees.length;

    const totalSalary =
    employees.reduce(
        (sum, emp) =>
        sum + Number(emp.salary),
        0
    );

    document.getElementById("totalSalary")
    .textContent = totalSalary;
}

function renderEmployees(data = employees){

    employeeList.innerHTML = "";

    data.forEach(emp => {

        const row =
        document.createElement("tr");

        row.innerHTML = `
            <td>${emp.name}</td>
            <td>${emp.email}</td>
            <td>${emp.position}</td>
            <td>$${emp.salary}</td>
            <td class="actions">
                <button
                class="btn-edit"
                onclick="editEmployee(${emp.id})">
                Edit
                </button>

                <button
                class="btn-delete"
                onclick="deleteEmployee(${emp.id})">
                Delete
                </button>
            </td>
        `;

        employeeList.appendChild(row);
    });

    updateStats();
}

form.addEventListener("submit", e => {

    e.preventDefault();

    const id =
    document.getElementById("employee-id").value;

    const employee = {
        id: id ? Number(id) : Date.now(),
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        position: document.getElementById("position").value,
        salary: document.getElementById("salary").value
    };

    if(id){

        const index =
        employees.findIndex(
            emp => emp.id === Number(id)
        );

        employees[index] = employee;

        alert("Employee updated successfully");

    }else{

        employees.push(employee);

        alert("Employee added successfully");
    }

    saveEmployees();
    renderEmployees();
    resetForm();
});

function editEmployee(id){

    const emp =
    employees.find(
        employee => employee.id === id
    );

    document.getElementById("employee-id").value =
    emp.id;

    document.getElementById("name").value =
    emp.name;

    document.getElementById("email").value =
    emp.email;

    document.getElementById("position").value =
    emp.position;

    document.getElementById("salary").value =
    emp.salary;

    formTitle.innerText =
    "Edit Employee";

    btnSave.innerText =
    "Update Employee";

    btnCancel.style.display =
    "block";
}

function deleteEmployee(id){

    if(confirm("Delete this employee?")){

        employees =
        employees.filter(
            emp => emp.id !== id
        );

        saveEmployees();
        renderEmployees();

        alert("Employee deleted");
    }
}

function resetForm(){

    form.reset();

    document.getElementById("employee-id")
    .value = "";

    formTitle.innerText =
    "Add Employee";

    btnSave.innerText =
    "Save Employee";

    btnCancel.style.display =
    "none";
}

btnCancel.addEventListener(
    "click",
    resetForm
);

document.getElementById("search")
.addEventListener("keyup", function(){

    const keyword =
    this.value.toLowerCase();

    const filtered =
    employees.filter(emp =>
        emp.name.toLowerCase().includes(keyword) ||
        emp.email.toLowerCase().includes(keyword) ||
        emp.position.toLowerCase().includes(keyword)
    );

    renderEmployees(filtered);
});

renderEmployees();

</script>

</body>
</html>
